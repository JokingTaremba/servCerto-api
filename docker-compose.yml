services:
  servcerto-db:
    image: postgres:15.3-alpine
    container_name: servcerto-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - servcerto-postgres:/var/lib/postgresql/data

  servcerto-pgadmin:
    image: dpage/pgadmin4:latest
    container_name: servcerto-pgadmin
    restart: always
    depends_on:
      - servcerto-db
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - servcerto-pgadmin:/var/lib/pgadmin
volumes:
  servcerto-postgres:
  servcerto-pgadmin: